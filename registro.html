<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Crear cuenta | Bootwo</title>

    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="style.css">

    <link rel="icon" href="bootwo/assets/logo.png">

</head>

<body>

    <main class="login-page">

        <section class="login-card card">

            <a href="index.html" class="login-logo-link">

                <img
                    src="bootwo/assets/logo.png"
                    alt="Bootwo"
                    class="logo">

            </a>

            <h1>Crear cuenta</h1>

            <p class="welcome-message">
                Crea tu espacio para comenzar a compartir tus emociones
                y conectar con tu pareja.
            </p>

            <form id="registerForm">

                <div class="form-group">

                    <label for="email">
                        Correo electrónico
                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="correo@ejemplo.com"
                        autocomplete="email"
                        required>

                </div>

                <div class="form-group">

                    <label for="password">
                        Contraseña
                    </label>

                    <input
                        type="password"
                        id="password"
                        placeholder="Mínimo 6 caracteres"
                        autocomplete="new-password"
                        minlength="6"
                        required>

                </div>

                <div class="form-group">

                    <label for="confirmPassword">
                        Confirmar contraseña
                    </label>

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Repite tu contraseña"
                        autocomplete="new-password"
                        minlength="6"
                        required>

                </div>

                <p
                    id="registerMessage"
                    class="form-message"
                    aria-live="polite">
                </p>

                <button
                    type="submit"
                    id="registerBtn"
                    class="btn-primary">

                    Crear cuenta

                </button>

            </form>

            <p class="auth-link">

                ¿Ya tienes una cuenta?

                <a href="login.html">
                    Inicia sesión
                </a>

            </p>

        </section>

    </main>

    <script type="module" src="registro.js"></script>

</body>

</html>
